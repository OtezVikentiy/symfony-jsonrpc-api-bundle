        Test:
            type: object
            properties:
                name:
                    type: string
            required:
                - name
        TestResponseResponse:
            type: object
            properties:
                jsonrpc:
                    type: string
                    example: '2.0'
                    default: '2.0'
                success:
                    type: boolean
                    example: '1'
                    default: '1'
                title:
                    type: string
                    example: 'iphone 12'
                    default: ''
                    format: '/[A-Za-z0-9]+/]/'
                request:
                    $ref: '#/components/schemas/TestRequest'
                tests:
                    type: array
                    items:
                        type: object
                        $ref: '#/components/schemas/Test'
                errors:
                    type: array
                    items:
                        type: string
                id:
                    type: integer
                    example: '0'
                    default: '0'
            required:
                - jsonrpc
                - title
                - id
