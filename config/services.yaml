parameters:
    ovJsonRpcApiSwaggerPath: '%env(string:OV_JSON_RPC_API_SWAGGER_PATH)%'
    accessControlAllowOriginList: '%ov_json_rpc_api.access_control_allow_origin_list%'
    strictNotifications: '%ov_json_rpc_api.strict_notifications%'
    allowExtraFields: '%ov_json_rpc_api.allow_extra_fields%'
    exposeInternalErrors: '%ov_json_rpc_api.expose_internal_errors%'
    corsStrict: '%ov_json_rpc_api.cors_strict%'
    maxPayloadBytes: '%ov_json_rpc_api.max_payload_bytes%'
    maxJsonDepth: '%ov_json_rpc_api.max_json_depth%'
    maxBatchSize: '%ov_json_rpc_api.max_batch_size%'
    maxDtoDepth: '%ov_json_rpc_api.max_dto_depth%'
    maxArrayParamSize: '%ov_json_rpc_api.max_array_param_size%'
    loggingRequestLevel: '%ov_json_rpc_api.logging.request_level%'
    loggingResponseLevel: '%ov_json_rpc_api.logging.response_level%'
    loggingErrorResponseLevel: '%ov_json_rpc_api.logging.error_response_level%'
    loggingMaxBodyLength: '%ov_json_rpc_api.logging.max_body_length%'
    loggingSkipPlainResponses: '%ov_json_rpc_api.logging.skip_plain_responses%'
    loggingMaskingPlaceholder: '%ov_json_rpc_api.logging.masking.placeholder%'
    loggingMaskingKeyPatterns: '%ov_json_rpc_api.logging.masking.key_patterns%'

services:
    _defaults:
        autowire: true
        public: false
        autoconfigure: true
        bind:
            $accessControlAllowOriginList: '%accessControlAllowOriginList%'
            $strictNotifications: '%strictNotifications%'
            $allowExtraFields: '%allowExtraFields%'
            $exposeInternalErrors: '%exposeInternalErrors%'
            $corsStrict: '%corsStrict%'
            $maxPayloadBytes: '%maxPayloadBytes%'
            $maxJsonDepth: '%maxJsonDepth%'
            $maxBatchSize: '%maxBatchSize%'
            $maxDtoDepth: '%maxDtoDepth%'
            $maxArrayParamSize: '%maxArrayParamSize%'
            $requestLevel: '%loggingRequestLevel%'
            $responseLevel: '%loggingResponseLevel%'
            $errorResponseLevel: '%loggingErrorResponseLevel%'
            $maxBodyLength: '%loggingMaxBodyLength%'
            $skipPlainResponses: '%loggingSkipPlainResponses%'
            $keyPatterns: '%loggingMaskingKeyPatterns%'
            $placeholder: '%loggingMaskingPlaceholder%'

    OV\JsonRPCAPIBundle\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/OVJsonRPCAPIBundle.php'

    _instanceof:
        OV\JsonRPCAPIBundle\Core\ApiMethodInterface:
            tags: ['ov.rpc.method']

    ov_json_rpc_api_index_controller:
        class: OV\JsonRPCAPIBundle\Controller\ApiController
        autoconfigure: true
        public: true
        tags:
            - 'controller.service_arguments'

    Symfony\Component\DependencyInjection\Container: '@service_container'

    ov_json_rpc_api_swagger_generate_command:
        class: OV\JsonRPCAPIBundle\Command\SwaggerGenerate
        autoconfigure: true
        public: true
        arguments:
            $ovJsonRpcApiSwaggerPath: '%ovJsonRpcApiSwaggerPath%'
            $swagger: '%ov_json_rpc_api.swagger%'
        tags:
            - { name: console.command, command: 'ov:swagger:generate' }

    OV\JsonRPCAPIBundle\Command\SwaggerGenerate: '@ov_json_rpc_api_swagger_generate_command'

    OV\JsonRPCAPIBundle\Core\Logging\JsonRpcLogFormatterInterface:
        alias: OV\JsonRPCAPIBundle\Core\Logging\DefaultJsonRpcLogFormatter

    OV\JsonRPCAPIBundle\Core\Logging\SensitiveDataMaskerInterface:
        alias: OV\JsonRPCAPIBundle\Core\Logging\SensitiveDataMasker

    OV\JsonRPCAPIBundle\Core\Logging\ContextIdGeneratorInterface:
        alias: OV\JsonRPCAPIBundle\Core\Logging\UuidContextIdGenerator
